<!DOCTYPE html>
<html>
<head>
<title>3D Pervious Concrete Model</title>
<style>
body { margin: 0; overflow: hidden; }
canvas { display: block; }
</style>
</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(8, 8, 12);

// Renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 10, 10);
scene.add(light);

// Base Plot
const plotGeometry = new THREE.BoxGeometry(12, 0.5, 8);
const plotMaterial = new THREE.MeshStandardMaterial({ color: 0xdddddd });
const plot = new THREE.Mesh(plotGeometry, plotMaterial);
scene.add(plot);

// Building (impervious)
const building = new THREE.Mesh(
  new THREE.BoxGeometry(5, 2, 3),
  new THREE.MeshStandardMaterial({ color: 0x777777 })
);
building.position.set(1, 1.25, 0);
scene.add(building);

// Parking (pervious)
const parking = new THREE.Mesh(
  new THREE.BoxGeometry(3, 0.3, 3),
  new THREE.MeshStandardMaterial({ color: 0x66ccff })
);
parking.position.set(-3, 0.4, -1);
scene.add(parking);

// Driveway (pervious)
const driveway = new THREE.Mesh(
  new THREE.BoxGeometry(3, 0.3, 2),
  new THREE.MeshStandardMaterial({ color: 0x66ccff })
);
driveway.position.set(-3, 0.4, -3);
scene.add(driveway);

// Setbacks (green infiltration zones)
function createSetback(x, z, w, d) {
  const s = new THREE.Mesh(
    new THREE.BoxGeometry(w, 0.2, d),
    new THREE.MeshStandardMaterial({ color: 0x88cc88 })
  );
  s.position.set(x, 0.2, z);
  scene.add(s);
}

// front, rear, left, right
createSetback(0, 3.5, 12, 1);
createSetback(0, -3.5, 12, 1);
createSetback(-5.5, 0, 1, 8);
createSetback(5.5, 0, 1, 8);

// Road
const road = new THREE.Mesh(
  new THREE.BoxGeometry(12, 0.2, 2),
  new THREE.MeshStandardMaterial({ color: 0x333333 })
);
road.position.set(0, 0.1, -5);
scene.add(road);

// Water arrows (infiltration)
function createArrow(x, z) {
  const arrow = new THREE.ArrowHelper(
    new THREE.Vector3(0, -1, 0),
    new THREE.Vector3(x, 2, z),
    1.5,
    0x0000ff
  );
  scene.add(arrow);
}

// arrows in parking + setbacks
createArrow(-3, -1);
createArrow(-3, -3);
createArrow(0, 3);
createArrow(3, 3);
createArrow(-5, 0);
createArrow(5, 0);

// Controls (rotation using mouse)
let isDragging = false;
let prevMouseX = 0;

document.addEventListener("mousedown", e => {
  isDragging = true;
  prevMouseX = e.clientX;
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

document.addEventListener("mousemove", e => {
  if (isDragging) {
    const delta = e.clientX - prevMouseX;
    scene.rotation.y += delta * 0.01;
    prevMouseX = e.clientX;
  }
});

// Animate
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
